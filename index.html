<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pinjaman Organisasi - Anggota</title>
    <!-- Menggunakan Tailwind v3 Play CDN untuk Stabilitas & Kecepatan Load -->
    <script src="https://tailwindcss.com"></script>
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* Mencegah layar berantakan sebelum css selesai dimuat */
        body { background-color: #f8fafc; font-family: sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-600 mb-2">Sistem Pinjaman & Angsuran Organisasi</h1>
            <p class="text-sm md:text-base text-slate-600">Papan Informasi Transparansi Angsuran Anggota</p>
        </header>

        <!-- Navigasi Tab -->
        <div class="flex border-b border-slate-200 mb-6 gap-2">
            <button id="tab-simulasi" onclick="gantiTab('simulasi')" class="py-2.5 px-4 font-semibold text-sm border-b-2 border-blue-600 text-blue-600 cursor-pointer">
                <i class="fa-solid fa-calculator mr-1"></i> Simulasi Angsuran
            </button>
            <button id="tab-monitoring" onclick="gantiTab('monitoring')" class="py-2.5 px-4 font-semibold text-sm border-b-2 border-transparent text-slate-500 cursor-pointer">
                <i class="fa-solid fa-users mr-1"></i> Monitoring Anggota
            </button>
        </div>

        <!-- TAB 1: SIMULASI -->
        <div id="konten-simulasi" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-fit">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-calculator text-blue-500"></i> Hitung</h2>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Nominal Pinjaman (Rp)</label>
                    <input type="number" id="simulasi-pinjaman" min="500000" placeholder="Contoh: 1000000" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button onclick="hitungSimulasi()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl cursor-pointer transition-all">Hitung Angsuran</button>
            </div>
            
            <div class="md:col-span-2 space-y-4">
                <div id="hasil-simulasi" class="hidden grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-4 rounded-2xl">
                        <p class="text-xs text-blue-600 font-bold uppercase">Angsuran / Bulan</p>
                        <p id="txt-angsuran" class="text-xl md:text-2xl font-bold text-blue-700 mt-1">Rp 0</p>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-2xl">
                        <p class="text-xs text-emerald-600 font-bold uppercase">Total Kembali</p>
                        <p id="txt-total" class="text-xl md:text-2xl font-bold text-emerald-700 mt-1">Rp 0</p>
                    </div>
                </div>
                
                <div id="tabel-simulasi-wrapper" class="hidden bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-100 text-xs font-bold text-slate-600 uppercase">
                                <tr>
                                    <th class="p-3 text-center w-20">Bulan</th>
                                    <th class="p-3">Angsuran Tetap</th>
                                </tr>
                            </thead>
                            <tbody id="body-simulasi" class="text-sm divide-y divide-slate-100 text-slate-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB 2: MONITORING ANGGOTA -->
        <div id="konten-monitoring" class="hidden bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 text-xs font-bold text-slate-600 uppercase">
                        <tr>
                            <th class="p-4">Nama Anggota</th>
                            <th class="p-4">Total Pinjaman</th>
                            <th class="p-4">Angsuran / Bln</th>
                            <th class="p-4 text-center">Bulan Ke</th>
                            <th class="p-4">Sisa Tagihan</th>
                            <th class="p-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="body-monitoring" class="text-sm divide-y divide-slate-100 text-slate-600"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        window.onload = muatDataAwal;
    </script>
</body>
</html>
