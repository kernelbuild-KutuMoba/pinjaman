<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pinjaman Organisasi - GitHub Version</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Hubungkan ke CSS Eksternal jika ada -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">Sistem Pinjaman & Angsuran Organisasi</h1>
            <p class="text-slate-600">Manajemen Transparan Berbasis Cloud & GitHub</p>
        </header>

        <!-- Navigasi Tab -->
        <div class="flex border-b border-slate-200 mb-6 gap-2">
            <button id="tab-simulasi" onclick="gantiTab('simulasi')" class="py-2.5 px-4 font-semibold text-sm border-b-2 border-blue-600 text-blue-600 cursor-pointer">
                <i class="fa-solid fa-calculator mr-1"></i> Simulasi
            </button>
            <button id="tab-monitoring" onclick="gantiTab('monitoring')" class="py-2.5 px-4 font-semibold text-sm border-b-2 border-transparent text-slate-500 cursor-pointer">
                <i class="fa-solid fa-users mr-1"></i> Monitoring Anggota
            </button>
            <button id="tab-admin" onclick="bukaPanelAdmin()" class="py-2.5 px-4 font-semibold text-sm border-b-2 border-transparent text-slate-500 cursor-pointer ml-auto text-amber-600">
                <i class="fa-solid fa-user-gear mr-1"></i> Panel Pengurus
            </button>
        </div>

        <!-- TAB 1: SIMULASI -->
        <div id="konten-simulasi" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100 h-fit">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-calculator text-blue-500"></i> Hitung</h2>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Nominal Pinjaman (Rp)</label>
                    <input type="number" id="simulasi-pinjaman" min="500000" placeholder="Contoh: 1000000" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                </div>
                <button onclick="hitungSimulasi()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl cursor-pointer">Hitung Angsuran</button>
            </div>
            <div class="md:col-span-2 space-y-4">
                <div id="hasil-simulasi" class="hidden grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-4 rounded-2xl"><p class="text-xs text-blue-600 font-bold">Angsuran / Bulan</p><p id="txt-angsuran" class="text-2xl font-bold text-blue-700">Rp 0</p></div>
                    <div class="bg-emerald-50 p-4 rounded-2xl"><p class="text-xs text-emerald-600 font-bold">Total Kembali</p><p id="txt-total" class="text-2xl font-bold text-emerald-700">Rp 0</p></div>
                </div>
                <div id="tabel-simulasi-wrapper" class="hidden bg-white rounded-2xl border border-slate-100 overflow-hidden">
                    <table class="w-full text-left"><thead class="bg-slate-100 text-xs font-bold text-slate-600 uppercase"><tr><th class="p-3 text-center">Bulan</th><th class="p-3">Angsuran</th></tr></thead><tbody id="body-simulasi" class="text-sm divide-y divide-slate-100"></tbody></table>
                </div>
            </div>
        </div>

        <!-- TAB 2: MONITORING ANGGOTA -->
        <div id="konten-monitoring" class="hidden bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-xs">
            <table class="w-full text-left">
                <thead class="bg-slate-100 text-xs font-bold text-slate-600 uppercase">
                    <tr>
                        <th class="p-4">Nama Anggota</th>
                        <th class="p-4">Total Pinjaman</th>
                        <th class="p-4">Angsuran / Bln</th>
                        <th class="p-4 text-center">Bulan Ke</th>
                        <th class="p-4">Sisa Tagihan</th>
                        <th class="p-4 text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="body-monitoring" class="text-sm divide-y divide-slate-100 text-slate-600"></tbody>
            </table>
        </div>

        <!-- TAB 3: PANEL PENGURUS -->
        <div id="konten-admin" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs">
                <h3 class="text-lg font-bold mb-4 text-slate-700"><i class="fa-solid fa-user-plus text-amber-500 mr-1"></i> Daftarkan Pinjaman Anggota Baru</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="text" id="adm-nama" placeholder="Nama Lengkap Anggota" class="px-3 py-2 border border-slate-200 rounded-xl">
                    <input type="number" id="adm-pinjaman" placeholder="Jumlah Pinjaman (Min 500000)" class="px-3 py-2 border border-slate-200 rounded-xl">
                </div>
                <button onclick="tambahAnggota()" class="mt-4 bg-amber-600 hover:bg-amber-700 text-white font-semibold py-2 px-4 rounded-xl cursor-pointer">Simpan Anggota</button>
            </div>
            <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-xs">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 text-xs font-bold text-slate-600 uppercase">
                        <tr>
                            <th class="p-4">Nama</th>
                            <th class="p-4">Pinjaman</th>
                            <th class="p-4 text-center">Bulan Terbayar</th>
                            <th class="p-4">Status</th>
                            <th class="p-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="body-admin" class="text-sm divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Hubungkan ke file JavaScript Eksternal -->
    <script src="script.js"></script>
</body>
</html>
