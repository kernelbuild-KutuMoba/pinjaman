<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Pengurus - Manajemen Angsuran</title>
    <style>
        /* CSS Murni - Tampilan Admin Gelap */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-b: 1px solid #334155; padding-bottom: 16px; margin-bottom: 30px; gap: 16px; flex-wrap: wrap; }
        header h1 { color: #f59e0b; font-size: 24px; }
        header p { color: #94a3b8; font-size: 14px; margin-top: 4px; }
        .btn-link { padding: 8px 16px; background-color: #1e293b; color: #cbd5e1; text-decoration: none; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid #334155; }
        .btn-link:hover { background-color: #334155; }

        /* Gerbang Keamanan */
        .lock-screen { fixed: inset 0; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: #020617; display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 999; }
        .lock-box { background-color: #0f172a; padding: 24px; border-radius: 16px; border: 1px solid #1e293b; width: 100%; max-width: 360px; text-align: center; }
        .lock-box h2 { font-size: 20px; margin-bottom: 6px; }
        .lock-box p { font-size: 13px; color: #94a3b8; margin-bottom: 16px; }
        .lock-box input { width: 100%; padding: 10px; text-align: center; background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; outline: none; margin-bottom: 16px; }
        .btn-submit { width: 100%; padding: 10px; background-color: #d97706; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Card Form Tambah */
        .admin-card { background-color: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; margin-bottom: 24px; }
        .admin-card h3 { font-size: 16px; margin-bottom: 14px; color: #f1f5f9; }
        .form-row { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 600px) { .form-row { grid-template-columns: 1fr 1fr; } }
        .admin-input { width: 100%; padding: 10px; background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; outline: none; }
        .btn-save { margin-top: 14px; padding: 10px 20px; background-color: #d97706; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Tabel Gelap Admin */
        .table-wrapper { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background-color: #334155; padding: 12px 16px; font-weight: 600; color: #cbd5e1; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px 16px; border-bottom: 1px solid #334155; color: #e2e8f0; }
        .num-input { width: 55px; text-align: center; background-color: #0f172a; border: 1px solid #475569; color: white; border-radius: 6px; padding: 4px; outline: none; }
        select { background-color: #0f172a; border: 1px solid #475569; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; outline: none; }
        .btn-del { background: none; border: none; color: #f87171; cursor: pointer; font-size: 14px; }
        .btn-del:hover { color: #ef4444; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Gerbang Verifikasi PIN -->
    <div id="gerbang-pin" class="lock-screen">
        <div class="lock-box">
            <h2>Otentikasi Pengurus</h2>
            <p>Masukkan PIN Keamanan untuk mengelola database pinjaman.</p>
            <input type="password" id="input-pin" placeholder="PIN ANDA">
            <button onclick="verifikasiPIN()" class="btn-submit">Masuk Panel</button>
        </div>
    </div>

    <!-- Konten Utama Admin -->
    <div id="konten-admin-utama" class="container hidden">
        <header>
            <div>
                <h1>Panel Pengurus</h1>
                <p>Pencatatan real-time anggota, jumlah cicilan, dan status tunggakan.</p>
            </div>
            <a href="index.html" class="btn-link">Lihat Halaman Anggota</a>
        </header>

        <!-- Form Input Anggota Baru -->
        <div class="admin-card">
            <h3>Daftarkan Pinjaman Anggota Baru</h3>
            <div class="form-row">
                <input type="text" id="adm-nama" placeholder="Nama Lengkap Anggota" class="admin-input">
                <input type="number" id="adm-pinjaman" placeholder="Jumlah Pinjaman (Min 500000)" class="admin-input">
            </div>
            <button onclick="tambahAnggota()" class="btn-save">Simpan Anggota Baru</button>
        </div>

        <!-- Tabel Kontrol Manajemen -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Pinjaman</th>
                        <th class="text-center">Bulan Terbayar</th>
                        <th>Status</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="body-admin"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function verifikasiPIN() {
            const pin = document.getElementById('input-pin').value;
            if (pin === "1234") {
                document.getElementById('gerbang-pin').classList.add('hidden');
                document.getElementById('konten-admin-utama').classList.remove('hidden');
                muatDataAwal();
            } else {
                alert("PIN Salah! Akses ditolak.");
            }
        }
    </script>
</body>
</html>
